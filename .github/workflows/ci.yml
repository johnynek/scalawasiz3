name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      SBT_OPTS: -Xms1G -Xmx4G -XX:+UseG1GC
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Check workflow trigger regressions
        run: ./tests/release-workflow-trigger.sh

      - uses: actions/cache@v4
        with:
          path: target/z3-wasi-cache
          key: z3-wasi-${{ runner.os }}-${{ hashFiles('versions.properties') }}

      - uses: actions/cache@v4
        with:
          path: target/z3-native-cache
          key: z3-native-${{ runner.os }}-${{ hashFiles('versions.properties') }}

      - name: Cache sbt directories
        uses: actions/cache@v4
        with:
          path: |
            .sbt-local
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt', 'project/**/*.scala', 'project/build.properties', 'project/plugins.sbt', '.sbtopts', 'versions.properties') }}
          restore-keys: |
            sbt-${{ runner.os }}-


      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: sbt/setup-sbt@v1

      - name: Install native build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake llvm ninja-build python3 file patch

      - name: Install native build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja llvm

      - name: Add Homebrew toolchain bins to PATH (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "$(brew --prefix cmake)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix ninja)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Run upstream Z3 C/C++ test suite
        if: runner.os == 'Linux'
        run: ./scripts/run-z3-cpp-tests.sh

      - name: Build Z3 WASI artifact
        run: ./scripts/build-z3-wasi.sh

      - name: Build Z3 native library
        run: ./scripts/build-z3-native.sh

      - name: Expose libz3 for Scala Native test runs
        shell: bash
        run: |
          echo "SCALAWASIZ3_Z3_NATIVE_LIB_DIR=$GITHUB_WORKSPACE/target/z3-native-install/lib" >> "$GITHUB_ENV"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/target/z3-native-install/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "DYLD_LIBRARY_PATH=$GITHUB_WORKSPACE/target/z3-native-install/lib:${DYLD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          fi

      - name: Validate JS WASI import coverage
        run: ./scripts/check-js-wasi-coverage.js core/shared/src/main/resources/dev/bosatsu/scalawasiz3/z3/z3.wasm

      - name: Install browser test tooling
        run: |
          npm install --no-save playwright
          npx playwright install chromium

      - name: Browser smoke test
        run: ./scripts/browser-smoke.js

      - name: Compile and test JVM + JS + Native
        run: sbt -J-Xms1G -J-Xmx4G -J-XX:+UseG1GC 'coreJVM/test' 'coreJS/test' 'coreNative/test'

      - name: Build Scala.js Node main
        run: |
          sbt -J-Xms1G -J-Xmx4G -J-XX:+UseG1GC \
            "set coreJS / scalaJSLinkerConfig ~= (_.withModuleKind(org.scalajs.linker.interface.ModuleKind.CommonJSModule))" \
            "set coreJS / scalaJSUseMainModuleInitializer := true" \
            "set coreJS / Compile / mainClass := Some(\"dev.bosatsu.scalawasiz3.NodeMain\")" \
            'coreJS/fullLinkJS'

      - name: Node main SAT/UNSAT smoke test
        run: ./scripts/node-main-smoke.sh core/js/target/scala-3.8.1/scalawasiz3-opt/main.js

      - name: Build native image wrapper
        run: |
          sbt -J-Xms1G -J-Xmx4G -J-XX:+UseG1GC \
            "set coreJVM / nativeImageOptions ++= Seq(\"-O2\")" \
            'coreJVM/nativeImage'

      - name: Native image SAT/UNSAT smoke test
        run: ./scripts/native-image-smoke.sh core/jvm/target/native-image/scalawasiz3-z3-main

      - name: Upload WASI artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: z3-wasi-artifacts
          path: |
            core/shared/src/main/resources/dev/bosatsu/scalawasiz3/z3/z3.wasm
            core/shared/src/main/resources/dev/bosatsu/scalawasiz3/z3/z3.wasm.sha256
            core/shared/src/main/resources/dev/bosatsu/scalawasiz3/z3/z3.imports.json
